apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-deployment
  labels:
    app: task-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-deployment
  template:
    metadata:
      labels:
        app: task-deployment
    spec:
      containers:
      - name: task-container
        image: task-manager-docker-project-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
