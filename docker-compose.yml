version: "3.9"

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
       - DB_HOST=mysql
       - DB_NAME=taskdb
       - DB_USER=root
       - DB_PASSWORD=root
    # volumes:
    #   - ./app:/app
    depends_on:
       mysql:
         condition: service_healthy


  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: taskdb
    ports:
      - "3308:3306"
    # volumes:
    #   - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost" , "-proof"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
